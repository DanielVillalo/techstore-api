version: '3.8'
services:
  microservicio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: techstore_api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@techstoredb_tp?TNS_ADMIN=/app/wallet
      SPRING_DATASOURCE_USERNAME: ADMIN
      SPRING_DATASOURCE_PASSWORD: TechStore2024#
    volumes:
      - ./src/main/resources/wallet:/app/wallet
